path = "tests/default_http_retry_int_test.rs"

[[test]]
name = "error_int_test"
path = "tests/error_int_test.rs"

[[test]]
name = "gateway_int_test"
path = "tests/gateway_int_test.rs"

[[test]]
name = "http_retry_int_test"
path = "tests/http_retry_int_test.rs"

[[test]]
name = "retry_config_int_test"
path = "tests/retry_config_int_test.rs"

[[test]]
name = "retry_layer_int_test"
path = "tests/retry_layer_int_test.rs"

