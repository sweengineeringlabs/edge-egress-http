# SWE default TLS client-identity policy.
#
# The only honest SWE "default" for mTLS is **none** — there is
# no universal client certificate this crate should attach. A
# `kind = "none"` baseline makes the layer a pass-through until a
# consumer explicitly configures a client certificate.
#
# Certificate material lives on the filesystem; passwords come
# from env vars. Same principle as swe_edge_egress_auth: secrets are
# referenced, not stored.

# Pass-through — no client cert attached.
kind = "none"

# --- pkcs12 scheme -------------------------------------------
# PKCS#12 bundle (.p12 / .pfx) — binary container with cert +
# private key + optional CA chain, protected by a password.
# kind = "pkcs12"
# # Path to the .p12 / .pfx file on disk.
# path = "/etc/edge/client.p12"
# # Env var holding the decryption password. Optional — set to
# # null / omit for passwordless bundles (discouraged; most
# # systems require one).
# password_env = "EDGE_TLS_PASSWORD"

# --- pem scheme ----------------------------------------------
# Combined PEM file containing BOTH the certificate chain and
# the private key. Split setups (separate cert.pem + key.pem)
# must concatenate before loading: `cat cert.pem key.pem >
# combined.pem`.
# kind = "pem"
# path = "/etc/edge/client-combined.pem"
