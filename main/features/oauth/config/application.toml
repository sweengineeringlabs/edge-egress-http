# SWE default OAuth policy.
#
# The only honest SWE "default" for OAuth is provider = "claude" with no
# credentials path override — consumers override this in their own config.
# Credentials file paths are resolved from XDG defaults per provider;
# override with credentials_path if the file lives elsewhere.

[oauth]
provider = "claude"
# credentials_path = "/path/to/credentials.json"
