[package]
name         = "swe-edge-egress-http"
version.workspace      = true
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description  = "edge — egress HTTP outbound domain: request/response types, outbound trait, and default reqwest-backed implementation."
keywords     = ["gateway", "egress", "http", "sea", "swe"]
categories   = ["network-programming"]

[lib]
path = "src/lib.rs"

[features]
default = []

[dependencies]
serde.workspace             = true
serde_json.workspace        = true
thiserror.workspace         = true
async-trait.workspace       = true
futures.workspace           = true
chrono.workspace            = true
http.workspace              = true
tokio                       = { workspace = true, features = ["rt", "net"] }
reqwest.workspace           = true
reqwest-middleware.workspace = true
swe-edge-egress-auth.workspace     = true
swe-edge-egress-retry.workspace    = true
swe-edge-egress-rate.workspace     = true
swe-edge-egress-breaker.workspace  = true
swe-edge-egress-cache.workspace    = true
swe-edge-egress-cassette.workspace = true
swe-edge-egress-tls.workspace      = true

[dev-dependencies]
tokio          = { workspace = true, features = ["rt-multi-thread", "macros", "net", "time"] }
hyper          = { version = "1", features = ["http1", "server"] }
hyper-util     = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
bytes          = "1"
